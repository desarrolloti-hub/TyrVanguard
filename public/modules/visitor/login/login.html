<section class="login-section">
    <!-- 🆕 ESPADA DE FONDO - Componente reutilizable -->
    <div class="sword-bg">
        <img class="sword-image" src="/assets/img/espada.svg" alt="" loading="lazy" />
    </div>

    <div class="login-container">
        <!-- Login Content -->
        <div class="login-content">
            <!-- Brand Header -->
            <header class="login-header">
                <div class="logo-ring">
                    <!-- 🆕 CAMBIADO: Espada → Ícono de Usuario -->
                    <i class="fas fa-user-circle logo-icon-user"></i>
                    <div class="logo-pulse"></div>
                </div>
                <h1 class="brand-title">ENTRA EN LA VANGUARDIA</h1>
                <div class="divider-line">
                    <div class="divider-diamond"></div>
                </div>
            </header>

            <!-- Login Card usando componentes -->
            <div class="login-card form-card">
                <div class="form-scanline"></div>
                <form class="login-form form" id="loginForm">
                    <!-- 🆕 BOTÓN DE GOOGLE -->
                    <div class="form-group">
                        <button type="button" class="btn btn-google btn-block" id="googleBtn">
                            <i class="fab fa-google btn-icon"></i>
                            <span class="btn-text">CONTINUAR CON GOOGLE</span>
                        </button>
                    </div>

                    <!-- Divisor -->
                    <div class="divider-or">
                        <span class="divider-or-text">O</span>
                    </div>

                    <!-- Correo Electrónico -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-envelope label-icon"></i>
                            CORREO ELECTRÓNICO
                            <span class="label-required">*</span>
                        </label>
                        <div class="input-icon-wrapper">
                            <input 
                                class="form-input" 
                                placeholder="guerrero@vanguard.com" 
                                type="email" 
                                id="email"
                                autocomplete="email"
                                required
                            />
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>

                    <!-- Código de Acceso -->
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-shield label-icon"></i>
                            CÓDIGO DE ACCESO
                            <span class="label-required">*</span>
                        </label>
                        <div class="input-icon-wrapper">
                            <input 
                                class="form-input has-right-icon" 
                                placeholder="••••••••" 
                                type="password" 
                                id="passwordInput"
                                autocomplete="current-password"
                                required
                                minlength="6"
                            />
                            <button class="input-toggle" type="button" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Submit Action -->
                    <div class="form-actions">
                        <button class="btn btn-primary btn-block" type="submit" id="submitBtn">
                            <span class="btn-text">INICIAR BATALLA</span>
                            <i class="fas fa-swords btn-icon"></i>
                        </button>
                    </div>

                    <!-- Secondary Links -->
                    <div class="secondary-links">
                        <a class="link-secondary" href="#">RECUPERAR HONOR</a>
                        <a class="link-secondary" href="/crearCuenta">NUEVO RECLUTA</a>
                    </div>
                </form>
            </div>

            <!-- Footer Motto -->
            <footer class="login-footer">
                <div class="motto-divider">
                    <i class="fas fa-grip-lines"></i>
                    <div class="motto-line"></div>
                    <i class="fas fa-grip-lines"></i>
                </div>
                <p class="motto-text">
                    CADA DÍA UNA <span class="text-primary">BATALLA</span>. CADA DÍA UNA <span class="text-secondary">VICTORIA</span>.
                </p>
            </footer>
        </div>
    </div>
</section>
